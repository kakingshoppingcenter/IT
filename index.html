<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IT Inventory Management System</title>
    <meta
      name="description"
      content="Standalone IT Inventory Management System with device management, asset tracking, repair management, transfer management, master data, and QR device pages."
    />
    <style>
:root {
  color-scheme: light;
  --bg-0: #e9edf2;
  --bg-1: #f2f4f7;
  --bg-2: #fcfdff;
  --panel: rgba(255, 255, 255, 0.96);
  --panel-strong: #ffffff;
  --panel-soft: #f7f8fa;
  --panel-muted: #edf1f5;
  --line: #d6dde7;
  --line-strong: #bec8d6;
  --text: #182231;
  --text-strong: #0f1726;
  --muted: #5f6b7d;
  --muted-strong: #344054;
  --blue: #2563eb;
  --blue-strong: #1d4ed8;
  --cyan: #38bdf8;
  --sky: #eef3ff;
  --emerald: #059669;
  --rose: #dc2626;
  --amber: #d97706;
  --shadow: 0 24px 44px rgba(15, 23, 42, 0.08);
  --shadow-soft: 0 14px 26px rgba(15, 23, 42, 0.06);
  --radius-xl: 28px;
  --radius-lg: 20px;
  --radius-md: 16px;
  --radius-sm: 12px;
  --content-width: 1280px;
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
  background: var(--bg-1);
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: "Segoe UI", "Inter", system-ui, sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(100, 116, 139, 0.12), transparent 28%),
    radial-gradient(circle at top right, rgba(37, 99, 235, 0.06), transparent 22%),
    linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 34%, #edf1f5 100%);
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -2;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.66), rgba(255, 255, 255, 0));
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  background-image:
    linear-gradient(rgba(100, 116, 139, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(100, 116, 139, 0.05) 1px, transparent 1px);
  background-size: 120px 120px;
  mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.35), transparent 78%);
}

a {
  color: inherit;
  text-decoration: none;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
}

code {
  padding: 0.18rem 0.42rem;
  border-radius: 10px;
  background: #f2f4f7;
  border: 1px solid #d8dee8;
  color: #1e3a8a;
  font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
  font-size: 0.92em;
}

.hidden {
  display: none !important;
}

.app-shell,
.boot-shell {
  width: min(var(--content-width), calc(100% - 40px));
  margin: 0 auto;
  padding: 28px 0 64px;
}

.app-shell {
  display: grid;
  gap: 20px;
}

.boot-shell {
  display: flex;
  min-height: 100vh;
  align-items: center;
  justify-content: center;
}

.boot-panel,
.panel {
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(214, 221, 231, 0.98);
  border-radius: var(--radius-xl);
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(246, 248, 250, 0.97));
  box-shadow: var(--shadow);
}

.boot-panel {
  max-width: 680px;
  padding: 32px;
}

.panel::before,
.boot-panel::before {
  content: "";
  position: absolute;
  inset: 0 0 auto 0;
  height: 4px;
  background: linear-gradient(90deg, rgba(30, 64, 175, 0.78), rgba(148, 163, 184, 0.42), transparent 82%);
}

.eyebrow {
  display: inline-flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  max-width: 100%;
  margin: 0;
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px solid #d8e0ea;
  background: #f4f6f9;
  color: #32507d;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.eyebrow::before {
  content: "";
  width: 8px;
  height: 8px;
  border-radius: 999px;
  background: linear-gradient(135deg, var(--blue), #60a5fa);
  box-shadow: 0 0 0 6px rgba(148, 163, 184, 0.14);
}

.boot-panel h1,
.hero-title,
.section-title,
.panel-title {
  margin: 18px 0 0;
  letter-spacing: -0.04em;
  line-height: 1.05;
  color: var(--text-strong);
}

.boot-panel h1 {
  font-size: clamp(2rem, 4vw, 3rem);
}

.boot-copy,
.hero-copy,
.section-copy,
.muted {
  color: var(--muted);
  line-height: 1.75;
}

.topbar {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: center;
  gap: 18px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.brand-mark {
  display: flex;
  width: 52px;
  height: 52px;
  align-items: center;
  justify-content: center;
  border-radius: 16px;
  background: linear-gradient(135deg, #1e3a8a, #3b82f6);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.28), 0 10px 20px rgba(15, 23, 42, 0.16);
  font-weight: 900;
  letter-spacing: 0.06em;
  color: white;
}

.brand-copy h1 {
  margin: 0;
  font-size: 1.12rem;
}

.brand-copy p {
  margin: 4px 0 0;
  font-size: 0.95rem;
  color: var(--muted);
}

.top-actions,
.nav-links,
.action-row,
.filter-row,
.card-grid,
.stats-grid,
.chip-row,
.page-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}

.nav-links a,
.chip,
.button,
.ghost-button,
.badge,
.status-badge,
.tiny-link {
  transition:
    background 0.18s ease,
    color 0.18s ease,
    border-color 0.18s ease,
    box-shadow 0.18s ease,
    transform 0.18s ease;
}

.nav-links a,
.chip,
.ghost-button {
  border: 1px solid var(--line);
  border-radius: 14px;
  background: var(--panel-strong);
  color: var(--muted-strong);
  box-shadow: var(--shadow-soft);
}

.nav-links a,
.chip {
  padding: 10px 16px;
  font-size: 0.92rem;
  font-weight: 700;
}

.nav-links a.active,
.chip.active {
  border-color: #bfcfe5;
  background: linear-gradient(180deg, #eef2f7, #dfe7f1);
  color: var(--blue-strong);
  box-shadow: 0 8px 16px rgba(15, 23, 42, 0.08);
}

.nav-links a:hover,
.chip:hover,
.ghost-button:hover,
.button:hover,
.tiny-link:hover {
  transform: translateY(-1px);
  box-shadow: 0 10px 18px rgba(15, 23, 42, 0.08);
}

.hero {
  display: grid;
  gap: 20px;
  grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
}

.hero-main,
.hero-side,
.panel-pad {
  padding: 26px;
}

.hero-main {
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(243, 246, 249, 0.97)),
    radial-gradient(circle at top right, rgba(59, 130, 246, 0.05), transparent 28%);
}

.hero-title {
  font-size: clamp(2.3rem, 3.6vw, 3.8rem);
  max-width: 760px;
}

.hero-copy {
  margin-top: 16px;
  max-width: 720px;
  font-size: 1.02rem;
}

.cta-primary,
.button.primary {
  background: linear-gradient(180deg, #2563eb, #1e40af);
  border: 1px solid #1d4ed8;
  color: white;
  box-shadow: 0 14px 24px rgba(30, 64, 175, 0.18);
}

.cta-secondary,
.button.secondary {
  background: var(--panel-strong);
  border: 1px solid var(--line);
  color: var(--text-strong);
}

.button,
.cta-primary,
.cta-secondary,
.ghost-button {
  display: inline-flex;
  min-height: 44px;
  align-items: center;
  justify-content: center;
  padding: 0 18px;
  border-radius: 14px;
  font-weight: 700;
}

.ghost-button {
  min-height: 40px;
  padding: 0 14px;
  color: var(--muted-strong);
}

.button.danger {
  border: 1px solid #f5c2c7;
  background: linear-gradient(180deg, #ef4444, #dc2626);
  color: white;
  box-shadow: 0 12px 20px rgba(220, 38, 38, 0.18);
}

.button.success {
  border: 1px solid #86efac;
  background: linear-gradient(180deg, #10b981, #059669);
  color: white;
  box-shadow: 0 12px 20px rgba(5, 150, 105, 0.16);
}

.ghost-button.danger {
  border-color: #fecaca;
  background: #fef2f2;
  color: #b91c1c;
}

.ghost-button.success {
  border-color: #bbf7d0;
  background: #ecfdf5;
  color: #047857;
}

.button[disabled],
.ghost-button[disabled],
.button.is-disabled,
.ghost-button.is-disabled {
  opacity: 0.58;
  cursor: not-allowed;
  transform: none;
  pointer-events: none;
  box-shadow: none;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
}

.stat-card,
.info-card,
.feed-card,
.metric-card,
.table-shell,
.empty-state,
.form-shell,
.detail-shell,
.timeline-card {
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.97), rgba(247, 248, 250, 0.96));
  box-shadow: var(--shadow-soft);
}

.stat-card,
.info-card,
.metric-card,
.feed-card,
.empty-state,
.timeline-card {
  padding: 18px;
}

.stat-card strong,
.metric-value {
  display: block;
  font-size: 1.9rem;
  letter-spacing: -0.04em;
  color: var(--text-strong);
}

.stat-card span,
.metric-help {
  display: block;
  margin-top: 6px;
  color: var(--muted);
  line-height: 1.6;
}

.stack-grid,
.page-grid,
.detail-grid,
.device-grid {
  display: grid;
  gap: 22px;
}

.page-grid {
  grid-template-columns: minmax(0, 1fr);
}

.device-grid {
  grid-template-columns: minmax(0, 1.16fr) minmax(320px, 0.84fr);
}

.detail-grid {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.form-grid {
  display: grid;
  gap: 18px;
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.form-grid .full {
  grid-column: 1 / -1;
}

.field {
  display: grid;
  gap: 8px;
}

.field label {
  color: var(--muted-strong);
  font-size: 0.78rem;
  font-weight: 800;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.input,
.select,
.textarea,
.file-input {
  width: 100%;
  min-height: 48px;
  border: 1px solid #d3ddea;
  border-radius: 14px;
  background: white;
  color: var(--text-strong);
  padding: 12px 14px;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.85);
  outline: none;
}

.select {
  appearance: none;
  background-image:
    linear-gradient(45deg, transparent 50%, #64748b 50%),
    linear-gradient(135deg, #64748b 50%, transparent 50%),
    linear-gradient(180deg, #ffffff, #ffffff);
  background-position:
    calc(100% - 18px) calc(50% - 4px),
    calc(100% - 13px) calc(50% - 4px),
    100% 0;
  background-size:
    5px 5px,
    5px 5px,
    2.6em 100%;
  background-repeat: no-repeat;
  padding-right: 48px;
}

.textarea {
  min-height: 120px;
  resize: vertical;
}

.input::placeholder,
.textarea::placeholder {
  color: #94a3b8;
}

.input:focus,
.select:focus,
.textarea:focus,
.file-input:focus {
  border-color: #93c5fd;
  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
}

.checkbox-grid {
  display: grid;
  gap: 12px;
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.checkbox-card {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 14px 16px;
  border-radius: 16px;
  border: 1px solid var(--line);
  background: var(--panel-muted);
}

.checkbox-card input {
  margin-top: 3px;
  accent-color: var(--blue);
}

.checkbox-card strong {
  display: block;
  font-size: 0.94rem;
  color: var(--text-strong);
}

.checkbox-card span {
  display: block;
  margin-top: 4px;
  color: var(--muted);
  font-size: 0.88rem;
  line-height: 1.6;
}

.table-shell {
  overflow: hidden;
  background: white;
}

.table-scroll {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 840px;
}

thead {
  background: linear-gradient(180deg, #f8fbff, #eef4fb);
}

th,
td {
  padding: 14px 16px;
  text-align: left;
  vertical-align: top;
}

th {
  color: #5f6f86;
  font-size: 0.74rem;
  font-weight: 800;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

tbody tr {
  border-top: 1px solid #e8eef6;
}

tbody tr:hover {
  background: #f8fbff;
}

.status-badge,
.badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 30px;
  padding: 0 12px;
  border-radius: 999px;
  font-size: 0.78rem;
  font-weight: 800;
  border: 1px solid transparent;
}

.badge.info {
  background: #eff6ff;
  border-color: #dbeafe;
  color: #1d4ed8;
}

.badge.active {
  background: #ecfdf5;
  border-color: #bbf7d0;
  color: #047857;
}

.badge.archived,
.badge.rose {
  background: #fef2f2;
  border-color: #fecaca;
  color: #b91c1c;
}

.badge.amber {
  background: #fff7ed;
  border-color: #fed7aa;
  color: #b45309;
}

.badge.slate {
  background: #f1f5f9;
  border-color: #e2e8f0;
  color: #475569;
}

.tiny-link {
  color: var(--blue-strong);
  font-weight: 700;
  background: none;
  border: none;
  padding: 0;
  text-align: left;
  box-shadow: none;
}

.tiny-link.danger {
  color: #b91c1c;
}

.tiny-link.success {
  color: #047857;
}

.inline-meta,
.detail-list,
.timeline,
.helper-list {
  display: grid;
  gap: 12px;
}

.url-block {
  display: block;
  margin-top: 6px;
  color: var(--muted-strong);
  font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
  font-size: 0.84rem;
  line-height: 1.6;
  word-break: break-all;
}

.url-cell {
  min-width: 280px;
}

.detail-list p,
.helper-list p,
.timeline-card p {
  margin: 0;
}

.panel-title {
  font-size: 1.55rem;
}

.section-title {
  font-size: clamp(1.9rem, 2.7vw, 2.5rem);
}

.section-copy,
.helper-text,
.table-note,
.empty-state p,
.info-card p {
  margin: 10px 0 0;
  color: var(--muted);
  line-height: 1.75;
}

.hero-side .timeline-card + .timeline-card,
.timeline-card + .timeline-card {
  margin-top: 12px;
}

.timeline-card strong {
  display: block;
  color: var(--text-strong);
}

.timeline-meta {
  margin-top: 8px;
  font-size: 0.84rem;
  color: var(--muted);
}

.panel-head,
.section-head {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.pagination {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 18px;
}

.pagination .ghost-button.active {
  border-color: #bfdbfe;
  background: #dbeafe;
  color: #1d4ed8;
}

.alert {
  padding: 14px 16px;
  border-radius: 16px;
  border: 1px solid var(--line);
  background: #f8fbff;
  line-height: 1.7;
  color: var(--text);
}

.alert.error {
  border-color: #fecaca;
  background: #fef2f2;
  color: #991b1b;
}

.alert.success {
  border-color: #bbf7d0;
  background: #ecfdf5;
  color: #065f46;
}

.alert.info {
  border-color: #bfdbfe;
  background: #eff6ff;
  color: #1e3a8a;
}

.split {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  justify-content: space-between;
}

.overlay {
  position: fixed;
  right: 20px;
  bottom: 20px;
  display: grid;
  gap: 10px;
  z-index: 100;
}

.toast {
  min-width: 260px;
  max-width: 360px;
  padding: 14px 16px;
  border-radius: 18px;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.96);
  box-shadow: var(--shadow);
  color: var(--text-strong);
}

.toast.success {
  border-color: #bbf7d0;
}

.toast.error {
  border-color: #fecaca;
}

.loader {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  color: var(--muted);
}

.loader::before {
  content: "";
  width: 14px;
  height: 14px;
  border: 2px solid rgba(37, 99, 235, 0.16);
  border-top-color: var(--blue);
  border-radius: 999px;
  animation: spin 0.9s linear infinite;
}

.qr-canvas-shell {
  display: grid;
  gap: 16px;
  justify-items: center;
  padding: 22px;
  border-radius: 20px;
  border: 1px dashed #c8d2df;
  background: linear-gradient(180deg, #f7f8fa, #edf1f5);
}

.qr-canvas-shell canvas {
  display: block;
  width: min(100%, 240px);
  height: auto;
  background: white;
  padding: 14px;
  border-radius: 18px;
  box-shadow: 0 10px 24px rgba(15, 23, 42, 0.1);
}

.qr-placeholder {
  max-width: 260px;
  text-align: center;
  color: var(--muted);
  line-height: 1.7;
}

.repo-note {
  border: 1px solid #fde68a;
  background: #fffbeb;
  color: #92400e;
}

.empty-state strong {
  display: block;
  font-size: 1.05rem;
  color: var(--text-strong);
}

.dashboard-grid,
.dashboard-bottom,
.dashboard-middle,
.master-grid,
.utility-grid {
  display: grid;
  gap: 20px;
}

.dashboard-kpis {
  display: grid;
  gap: 16px;
  grid-template-columns: repeat(4, minmax(0, 1fr));
}

.dashboard-middle {
  grid-template-columns: minmax(0, 1.32fr) minmax(340px, 0.92fr);
  align-items: start;
}

.dashboard-bottom {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.master-grid {
  grid-template-columns: minmax(320px, 0.88fr) minmax(0, 1.12fr);
}

.utility-grid {
  grid-template-columns: 1fr;
  align-content: start;
}

.kpi-card {
  display: grid;
  gap: 12px;
  min-height: 168px;
  padding: 20px;
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(244, 248, 255, 0.96)),
    radial-gradient(circle at top right, rgba(37, 99, 235, 0.08), transparent 30%);
  box-shadow: var(--shadow-soft);
}

.kpi-label {
  font-size: 0.82rem;
  font-weight: 800;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted-strong);
}

.kpi-value {
  font-size: clamp(2rem, 3vw, 2.8rem);
  font-weight: 800;
  letter-spacing: -0.05em;
  color: var(--text-strong);
}

.kpi-caption {
  color: var(--muted);
  line-height: 1.6;
}

.section-block {
  display: grid;
  gap: 18px;
}

.section-block + .section-block {
  margin-top: 18px;
}

.section-subtitle {
  margin: 6px 0 0;
  color: var(--muted);
  line-height: 1.7;
}

.toolbar-grid {
  display: grid;
  gap: 14px;
  grid-template-columns: repeat(5, minmax(0, 1fr));
}

.filter-shell {
  display: grid;
  gap: 12px;
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background: var(--panel-muted);
}

.table-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.table-action {
  min-height: 34px;
  padding: 0 12px;
  border-radius: 12px;
  font-size: 0.84rem;
  font-weight: 700;
}

.summary-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

.summary-table td,
.summary-table th {
  padding: 12px 0;
  border-top: 1px solid #e6edf6;
}

.summary-table tr:first-child td,

function detectBasePath(pathname = window.location.pathname) {
  const segments = pathname.split("/").filter(Boolean);
  const isGithubPagesHost = /\.github\.io$/i.test(window.location.hostname);

  if (!isGithubPagesHost || segments.length === 0) {
    return "";
  }

  if (RESERVED_ROOTS.has(segments[0])) {
    return "";
  }

  return `/${segments[0]}`;
}

function routeHref(path, query = {}) {
  const params = new URLSearchParams();

  Object.entries(query).forEach(([key, value]) => {
    if (value !== undefined && value !== null && value !== "") {
      params.set(key, String(value));
    }
  });

  const suffix = params.toString() ? `?${params.toString()}` : "";
  return `#${path}${suffix}`;
}

function absoluteHashUrl(path, query = {}) {
  const basePath = detectBasePath();
  const hash = routeHref(path, query);
  return `${window.location.origin}${basePath}/${hash}`;
}

function buildDevicePublicUrl(qrSlug) {
  const slug = String(qrSlug ?? "").trim();
  return slug ? absoluteHashUrl(`/device/${encodeURIComponent(slug)}`) : "";
}

function escapeLikeValue(value) {
  return value.replace(/[%_]/g, (char) => `\\${char}`);

function normalizeVisibility(visibility) {
  if (visibility === "active" || visibility === "archived" || visibility === "all") {

function applyDeviceFilters(query, { search, status, visibility, deviceType, branchId, departmentId, locationId }) {
  const nextVisibility = normalizeVisibility(visibility);

  if (nextVisibility === "active") {
    nextQuery = nextQuery.eq("is_active", true);
  } else if (nextVisibility === "archived") {
    nextQuery = nextQuery.eq("is_active", false);

  if (search) {
    const keyword = escapeLikeValue(search.trim());
    nextQuery = nextQuery.or(
      `asset_code.ilike.%${keyword}%,device_name.ilike.%${keyword}%,serial_number.ilike.%${keyword}%,qr_slug.ilike.%${keyword}%`,
    );
  }

  if (status) {
    nextQuery = nextQuery.eq("status", status);

  if (deviceType) {

  if (branchId) {

  if (departmentId) {

  }

  if (locationId) {

  }

  return nextQuery;

async function fetchLookupTable(tableName, primaryColumns, fallbackColumns) {
  const primary = await supabase.from(tableName).select(primaryColumns).order("name");
  if (!primary.error) {
    return { data: primary.data ?? [], legacy: false };
  }

  if (!fallbackColumns) {
    throw primary.error;
  }

  const fallback = await supabase.from(tableName).select(fallbackColumns).order("name");
  if (fallback.error) {
    throw primary.error;
  }

  return {
    legacy: true,
    data: (fallback.data ?? []).map((item) => ({ ...item, is_active: true })),
  };
}

    if (cached) {

        if (Date.now() - parsed.timestamp < LOOKUP_CACHE_TTL_MS) {
          return parsed.value;
        }
      } catch {
        window.sessionStorage.removeItem(LOOKUP_CACHE_KEY);
      }
    }
  }

  const [deviceTypesResult, departmentsResult, branchesResult, locationsResult] = await Promise.all([
    supabase.from("device_types").select("id, name, code, description, is_active").order("name"),
    fetchLookupTable("departments", "id, name, code, is_active", "id, name, code"),
    fetchLookupTable("branches", "id, name, code, is_active", "id, name, code"),
    fetchLookupTable("locations", "id, name, code, branch_id, floor_label, is_active", "id, name, code, branch_id, floor_label"),
  ]);

  const deviceTypesManaged = !deviceTypesResult.error;
  const deviceTypes = deviceTypesManaged
    ? deviceTypesResult.data ?? []
    : LEGACY_DEVICE_TYPES.map((name) => ({
        id: name,
        code: name.toUpperCase().replace(/[^A-Z0-9]+/g, "_"),
        name,
        description: null,
        is_active: true,
      }));

  const value = {
    deviceTypes,
    departments: departmentsResult.data ?? [],
    branches: branchesResult.data ?? [],
    locations: locationsResult.data ?? [],
    meta: {
      deviceTypesManaged,
      masterDataReady:
        deviceTypesManaged && !departmentsResult.legacy && !branchesResult.legacy && !locationsResult.legacy,
    },
  };

  window.sessionStorage.setItem(
    LOOKUP_CACHE_KEY,
    JSON.stringify({ timestamp: Date.now(), value }),
  );

  return value;
}

function normalizeSummaryRows(rows = []) {
  return [...rows].sort((a, b) => Number(b.total ?? 0) - Number(a.total ?? 0) || String(a.label).localeCompare(String(b.label)));
}

function buildMonthBuckets(monthCount = 6) {
  const buckets = [];
  const today = new Date();
  const currentMonth = new Date(Date.UTC(today.getUTCFullYear(), today.getUTCMonth(), 1));

  for (let offset = monthCount - 1; offset >= 0; offset -= 1) {
    const month = new Date(Date.UTC(currentMonth.getUTCFullYear(), currentMonth.getUTCMonth() - offset, 1));
    const key = month.toISOString().slice(0, 10);
    buckets.push({
      month_key: key,
      month_label: new Intl.DateTimeFormat("en-US", { month: "short", year: "numeric", timeZone: "UTC" }).format(month),
      devices_added: 0,
      repairs_logged: 0,
      transfers_logged: 0,
    });
  }

  return buckets;
}

function addToMonthBucket(buckets, value, field) {
  if (!value) return;
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return;

  const monthKey = new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), 1)).toISOString().slice(0, 10);
  const bucket = buckets.find((item) => item.month_key === monthKey);
  if (bucket) {
    bucket[field] += 1;
  }
}

function buildSummaryCounts(items, getLabel) {
  const counts = new Map();

  items.forEach((item) => {
    const label = getLabel(item);
    counts.set(label, (counts.get(label) || 0) + 1);
  });

  return normalizeSummaryRows(
    Array.from(counts.entries()).map(([label, total]) => ({
      label,
      total,
    })),
  );
}

async function getDashboardMonthlySummary(monthCount = 6) {
  const rpc = await supabase.rpc("admin_dashboard_monthly_summary", { p_months: monthCount });
  if (!rpc.error && Array.isArray(rpc.data) && rpc.data.length) {
    return rpc.data;
  }

  const buckets = buildMonthBuckets(monthCount);
  const oldestMonth = buckets[0]?.month_key;

  const [devices, repairs, transfers] = await Promise.all([
    supabase.from("devices").select("created_at").gte("created_at", oldestMonth),
    supabase.from("repair_requests").select("requested_at").gte("requested_at", oldestMonth),
    supabase.from("transfer_histories").select("date_transferred").gte("date_transferred", oldestMonth),
  ]);

  for (const result of [devices, repairs, transfers]) {
    if (result.error) {
      throw result.error;
    }
  }

  (devices.data ?? []).forEach((item) => addToMonthBucket(buckets, item.created_at, "devices_added"));
  (repairs.data ?? []).forEach((item) => addToMonthBucket(buckets, item.requested_at, "repairs_logged"));
  (transfers.data ?? []).forEach((item) => addToMonthBucket(buckets, item.date_transferred, "transfers_logged"));

  return [...buckets].reverse();
}

  const rpcMissing =
    rpc.error.code === "42883" ||
    rpc.error.code === "PGRST202" ||
    rpcMessage.includes("admin_delete_device_if_allowed");

  }

function masterDataError(error) {
  if (!error) {
    return new Error("Master data is not ready.");
  }

  const message = `${error.message || ""} ${error.details || ""}`.toLowerCase();
  if (
    error.code === "42P01" ||
    error.code === "42703" ||
    error.code === "PGRST204" ||
    message.includes("device_types") ||
    message.includes("is_active")
  ) {
    return new Error(
      "Run the latest database migration to enable Master Data management.",
    );
  }

  return error;
}

async function getMasterDataRecords(entity, options = {}) {
  const config = getMasterEntityConfig(entity);
  const page = Math.max(1, Number(options.page ?? 1) || 1);
  const from = (page - 1) * ADMIN_PAGE_SIZE;
  const to = from + ADMIN_PAGE_SIZE - 1;
  const visibility = normalizeVisibility(options.visibility);
  const keyword = options.search ? escapeLikeValue(options.search.trim()) : null;

  let query = supabase.from(config.table).select(config.select, { count: "exact" });

  if (visibility === "active") {
    query = query.eq("is_active", true);
  } else if (visibility === "archived") {
    query = query.eq("is_active", false);
  }

  if (keyword && config.searchColumns.length) {
    query = query.or(
      config.searchColumns.map((column) => `${column}.ilike.%${keyword}%`).join(","),
    );
  }

  const { data, count, error } = await query
    .order(config.orderBy || "name", { ascending: true })
    .range(from, to);

  if (error) {
    throw masterDataError(error);
  }

  return {
    data: data ?? [],
    total: count ?? 0,
    page,
  };
}

        .from("devices")
        .select("id", { head: true, count: "exact" })
        .eq("device_type", record.name);

      if (devices.error) throw devices.error;

      return {
        total: devices.count ?? 0,
        entries: [{ label: "Device records", total: devices.count ?? 0 }],
      };

    if (entity === "branches") {
      const [locations, devices, transferFrom, transferTo] = await Promise.all([
        supabase.from("locations").select("id", { head: true, count: "exact" }).eq("branch_id", record.id),

      ]);

      for (const result of [locations, devices, transferFrom, transferTo]) {
        if (result.error) throw result.error;
      }

      const entries = [
        { label: "Locations", total: locations.count ?? 0 },
        { label: "Device records", total: devices.count ?? 0 },
        { label: "Transfer records", total: (transferFrom.count ?? 0) + (transferTo.count ?? 0) },

        supabase.from("devices").select("id", { head: true, count: "exact" }).eq("department_id", record.id),
        supabase.from("transfer_histories").select("id", { head: true, count: "exact" }).eq("from_department_id", record.id),

      for (const result of [devices, transferFrom, transferTo]) {
        if (result.error) throw result.error;
      }

      const entries = [
        { label: "Device records", total: devices.count ?? 0 },
        { label: "Transfer records", total: (transferFrom.count ?? 0) + (transferTo.count ?? 0) },
      ];

      return { total: entries.reduce((sum, entry) => sum + entry.total, 0), entries };
    }

    const [devices, transferFrom, transferTo] = await Promise.all([
      supabase.from("devices").select("id", { head: true, count: "exact" }).eq("location_id", record.id),
      supabase.from("transfer_histories").select("id", { head: true, count: "exact" }).eq("from_location_id", record.id),
      supabase.from("transfer_histories").select("id", { head: true, count: "exact" }).eq("to_location_id", record.id),
    ]);

    }

      { label: "Device records", total: devices.count ?? 0 },
      { label: "Transfer records", total: (transferFrom.count ?? 0) + (transferTo.count ?? 0) },
    ];

    return { total: entries.reduce((sum, entry) => sum + entry.total, 0), entries };

  }

function buildConicGradient(items) {
  const total = items.reduce((sum, item) => sum + Number(item.total ?? 0), 0);
  if (!total) {
    return "conic-gradient(#dbe3ee 0deg 360deg)";
  }

  let cursor = 0;
  const slices = items.map((item, index) => {
    const share = (Number(item.total ?? 0) / total) * 360;
    const start = cursor;
    cursor += share;
    return `${DASHBOARD_COLORS[index % DASHBOARD_COLORS.length]} ${start}deg ${cursor}deg`;
  });

  return `conic-gradient(${slices.join(", ")})`;
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function slugify(value) {
  return String(value ?? "")
    .trim()
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "")
    .slice(0, 80);
}

function formatDate(value) {
  if (!value) return "Not available";
  return new Intl.DateTimeFormat("en-US", { dateStyle: "medium" }).format(new Date(value));
}

function formatDateTime(value) {
  if (!value) return "Not available";
  return new Intl.DateTimeFormat("en-US", { dateStyle: "medium", timeStyle: "short" }).format(
    new Date(value),
  );
}

function pluralizeLabel(count, singular, plural = `${singular}s`) {
  return `${count} ${count === 1 ? singular : plural}`;
}

function formatDeviceDeleteUsage(usage) {
  const parts = [];

  if (usage.history > 0) {
    parts.push(pluralizeLabel(usage.history, "history record"));
  }

  if (usage.transfers > 0) {
    parts.push(pluralizeLabel(usage.transfers, "transfer"));
  }

  if (usage.repairs > 0) {
    parts.push(pluralizeLabel(usage.repairs, "repair request"));
  }

  return parts.join(", ");
}

function toNullable(value) {

function getRoute() {

  const [pathPart, queryString = ""] = raw.split("?");
  const path = pathPart.startsWith("/") ? pathPart : `/${pathPart}`;
  const query = Object.fromEntries(new URLSearchParams(queryString).entries());
  return { path, query };
}

}

async function copyText(text) {
  const value = String(text ?? "").trim();
  if (!value) {
    throw new Error("No public URL is available to copy yet.");
  }

  if (navigator.clipboard?.writeText) {
    await navigator.clipboard.writeText(value);
    return;
  }

  const fallback = document.createElement("textarea");
  fallback.value = value;
  fallback.setAttribute("readonly", "readonly");
  fallback.style.position = "fixed";
  fallback.style.opacity = "0";
  fallback.style.pointerEvents = "none";
  document.body.appendChild(fallback);
  fallback.focus();
  fallback.select();

  const copied = document.execCommand("copy");
  document.body.removeChild(fallback);

  if (!copied) {
    throw new Error("Copy is not available in this browser.");
  }
}

function renderToasts() {
  const overlay = document.querySelector("[data-toast-root]");
  if (!overlay) return;

  overlay.innerHTML = state.toasts
    .map(
      (item) => `
        <div class="toast ${escapeHtml(item.type)}">

function renderPagination(path, query, currentPage, totalPages) {
  if (totalPages <= 1) return "";

  const items = [];
  const start = Math.max(1, currentPage - 2);
  const end = Math.min(totalPages, currentPage + 2);

  items.push(
    `<a class="ghost-button ${currentPage === 1 ? "hidden" : ""}" href="${routeHref(path, {
      ...query,
      page: Math.max(1, currentPage - 1),
    })}">Previous</a>`,
  );

  for (let page = start; page <= end; page += 1) {
    items.push(
      `<a class="ghost-button ${page === currentPage ? "active" : ""}" href="${routeHref(path, {
        ...query,
        page,
      })}">${page}</a>`,
    );
  }

  items.push(
    `<a class="ghost-button ${currentPage === totalPages ? "hidden" : ""}" href="${routeHref(path, {
      ...query,
      page: Math.min(totalPages, currentPage + 1),
    })}">Next</a>`,
  );

  return `<div class="pagination">${items.join("")}</div>`;
}

function parseDeviceRoute(path) {
  const deviceMatch = path.match(/^\/device\/([^/]+)$/);
  if (deviceMatch) {
    return { kind: "public-device", slug: decodeURIComponent(deviceMatch[1]) };
  }

  const editMatch = path.match(/^\/device\/([^/]+)\/edit$/);
  if (editMatch) {
    return { kind: "public-device-edit", slug: decodeURIComponent(editMatch[1]) };
  }

  return null;
}

function parseAdminDeviceRoute(path) {
  if (path === "/admin/devices/new") {
    return { kind: "admin-device-form", id: null };
  }

  const editMatch = path.match(/^\/admin\/devices\/([^/]+)\/edit$/);
  if (editMatch) {
    return { kind: "admin-device-form", id: decodeURIComponent(editMatch[1]) };
  }

  return null;
}

function parseAdminRepairRoute(path) {
  const detailMatch = path.match(/^\/admin\/repairs\/([^/]+)$/);
  if (detailMatch) {
    return { kind: "admin-repair-detail", id: decodeURIComponent(detailMatch[1]) };
  }

  return null;
}

function parseAdminMasterDataRoute(path) {
  const match = path.match(/^\/admin\/master-data(?:\/([^/]+))?$/);
  if (!match) {
    return null;
  }

  return {
    kind: "admin-master-data",
    entity: normalizeMasterEntity(decodeURIComponent(match[1] || "device-types")),
  };
}

async function ensureAuthHydrated() {
  const session = await getSessionBundle();
  state.session = session;

}

function normalizeRedirectedRoute() {
  const searchParams = new URLSearchParams(window.location.search);
  const incoming = searchParams.get("route");

  if (!incoming || window.location.hash) {
    return;
  }

  const basePath = detectBasePath();
  const nextHash = incoming.startsWith("/") ? `#${incoming}` : `#/${incoming}`;
  history.replaceState({}, "", `${basePath}/${nextHash}`);
}

function requireAdminRoute(targetPath, query = {}) {
  const fullPath = `${targetPath}${new URLSearchParams(query).toString() ? `?${new URLSearchParams(query).toString()}` : ""}`;
  state.pendingRoute = fullPath;
  replaceRoute("/admin/login", { next: fullPath });
}

async function renderAdminDeviceFormPage(id) {

function renderPublicActivityCards(historyItems, transferItems, repairItems, slug) {
  const historyHtml = historyItems.length
    ? historyItems
        .map(
          (item) => `
            <div class="timeline-card">
              <div class="split">
                ${renderHistoryBadge(item.action_type)}
                <span class="muted">${escapeHtml(formatDateTime(item.created_at))}</span>
              </div>
              <p style="margin-top: 12px;">${escapeHtml(item.description)}</p>
              ${item.actor_name ? `<p class="timeline-meta">By ${escapeHtml(item.actor_name)}</p>` : ""}
            </div>
          `,
        )
        .join("")
    : emptyState("No history yet", "No device history has been recorded yet.");

  const transferHtml = transferItems.length
    ? transferItems
        .map(
          (item) => `
            <div class="timeline-card">
              <div class="split">
                <strong>${escapeHtml(item.from_assigned_to ?? "Unassigned")} → ${escapeHtml(item.to_assigned_to ?? "Unassigned")}</strong>
                <span class="muted">${escapeHtml(formatDateTime(item.date_transferred))}</span>
              </div>
              <p class="timeline-meta">${escapeHtml(item.from_department_name ?? "No department")} / ${escapeHtml(item.from_branch_name ?? "No branch")} / ${escapeHtml(item.from_location_name ?? "No location")}</p>
              <p class="timeline-meta">${escapeHtml(item.to_department_name ?? "No department")} / ${escapeHtml(item.to_branch_name ?? "No branch")} / ${escapeHtml(item.to_location_name ?? "No location")}</p>
              ${item.reason ? `<p style="margin-top: 10px;">${escapeHtml(item.reason)}</p>` : ""}
            </div>
          `,
        )
        .join("")
    : emptyState("No transfers yet", "No transfer history is available for this device.");

  const repairHtml = repairItems.length
    ? repairItems
        .map(
          (item) => `
            <div class="timeline-card">
              <div class="split">
                <div class="chip-row">
                  ${renderBadge(item.status, getRepairStatusBadgeType(item.status))}
                  ${renderBadge(item.priority, "amber")}
                </div>
                <span class="muted">${escapeHtml(formatDateTime(item.requested_at))}</span>

              <p style="margin-top: 12px;">${escapeHtml(item.problem_description)}</p>
              ${item.assigned_technician ? `<p class="timeline-meta">Technician: ${escapeHtml(item.assigned_technician)}</p>` : ""}
            </div>
          `,
        )
        .join("")
    : emptyState("No repairs yet", "No repair history is available for this device.");

  return `
    <section class="detail-grid">
      <section class="panel">
        <div class="panel-pad">
          <div class="section-head">
            <div>
              <p class="eyebrow">System Records</p>
              <h3 class="panel-title">Recent device history</h3>
            </div>
            <button class="ghost-button" data-action="load-history" data-slug="${escapeHtml(slug)}" data-offset="${historyItems.length}">Load More</button>
          </div>
          <div class="timeline" id="history-list" style="margin-top: 20px;">${historyHtml}</div>
        </div>
      </section>
      <section class="panel">
        <div class="panel-pad">
          <div class="section-head">
            <div>
              <p class="eyebrow">Recent Transfers</p>
              <h3 class="panel-title">Assignment movement</h3>
            </div>
            <button class="ghost-button" data-action="load-transfers" data-slug="${escapeHtml(slug)}" data-offset="${transferItems.length}">Load More</button>
          </div>
          <div class="timeline" id="transfer-list" style="margin-top: 20px;">${transferHtml}</div>
        </div>
      </section>
    </section>

    <section class="panel">
      <div class="panel-pad">
        <div class="section-head">
          <div>
            <p class="eyebrow">Recent Repairs</p>
            <h3 class="panel-title">Repair history</h3>
          </div>
          <button class="ghost-button" data-action="load-repairs" data-slug="${escapeHtml(slug)}" data-offset="${repairItems.length}">Load More</button>

async function resolveRoute() {
  const route = getRoute();
  const deviceRoute = parseDeviceRoute(route.path);
  const adminDeviceRoute = parseAdminDeviceRoute(route.path);
  const adminRepairRoute = parseAdminRepairRoute(route.path);
  const adminMasterDataRoute = parseAdminMasterDataRoute(route.path);

  if (route.path === "/") {
    return renderHomePage();
  }

  if (route.path === "/admin/login") {
    return renderAdminLoginPage(route.query);
  }

  if (route.path === "/admin/dashboard") {
    if (!isAdmin()) {
      requireAdminRoute(route.path, route.query);
      return null;
    }
    return renderAdminDashboardPage();
  }

  if (route.path === "/admin/devices") {
    if (!isAdmin()) {
      requireAdminRoute(route.path, route.query);
      return null;
    }
    return renderAdminDevicesPage(route.query);
  }

  if (route.path === "/admin/public-urls") {
    if (!isAdmin()) {
      requireAdminRoute(route.path, route.query);
      return null;
    }
    return renderAdminPublicUrlsPage(route.query);
  }

  if (adminDeviceRoute) {
    if (!isAdmin()) {
      requireAdminRoute(route.path, route.query);
      return null;
    }
    return renderAdminDeviceFormPage(adminDeviceRoute.id);
  }

  if (route.path === "/admin/repairs") {
    if (!isAdmin()) {
      requireAdminRoute(route.path, route.query);
      return null;
    }
    return renderAdminRepairsPage(route.query);
  }

  if (adminRepairRoute) {
    if (!isAdmin()) {
      requireAdminRoute(route.path, route.query);
      return null;
    }
    return renderAdminRepairDetailPage(adminRepairRoute.id);
  }

  if (route.path === "/admin/transfers") {
    if (!isAdmin()) {
      requireAdminRoute(route.path, route.query);
      return null;
    }
    return renderAdminTransfersPage(route.query);
  }

  if (adminMasterDataRoute) {
    if (!isAdmin()) {
      requireAdminRoute(route.path, route.query);
      return null;
    }
    return renderAdminMasterDataPage(adminMasterDataRoute.entity, route.query);
  }

  if (route.path === "/admin/history") {
    if (!isAdmin()) {
      requireAdminRoute(route.path, route.query);
      return null;
    }
    return renderAdminHistoryPage(route.query);
  }

  if (deviceRoute?.kind === "public-device") {
    return renderPublicDevicePage(deviceRoute.slug);
  }

  if (deviceRoute?.kind === "public-device-edit") {
    if (!isAdmin()) {
      requireAdminRoute(route.path, route.query);
      return null;
    }
    return renderPublicEditPage(deviceRoute.slug);
  }

  return shell(`
    <section class="panel">
      <div class="panel-pad">
        ${emptyState("Page not found", "The route you requested is not available in this static build.", `<a class="button secondary" href="${routeHref("/")}">Back Home</a>`)}
      </div>
    </section>
  `);
}

function bindDebouncedSearchInputs() {
  const inputs = document.querySelectorAll("[data-search-route]");

  inputs.forEach((input) => {
    let timer = null;

    input.addEventListener("input", () => {
      window.clearTimeout(timer);
      timer = window.setTimeout(() => {
        const { query } = getRoute();
        const nextQuery = {};
        const preserve = String(input.getAttribute("data-preserve") || "")
          .split(",")
          .map((value) => value.trim())
          .filter(Boolean);

        preserve.forEach((key) => {
          if (query[key]) {
            nextQuery[key] = query[key];
          }
        });

        if (input.value.trim()) {
          nextQuery.q = input.value.trim();
        }

        nextQuery.page = 1;
        go(input.getAttribute("data-search-route"), nextQuery);
      }, 350);
    });
  });
}

function bindFilterSelects() {
  const selects = document.querySelectorAll("[data-filter-route]");

  selects.forEach((select) => {
    select.addEventListener("change", () => {
      const { query } = getRoute();
      const nextQuery = {};
      const filterKey = select.getAttribute("data-filter-key") || "status";
      const preserve = String(select.getAttribute("data-preserve") || "")
        .split(",")
        .map((value) => value.trim())
        .filter(Boolean);
      const resetKeys = String(select.getAttribute("data-reset-keys") || "")
        .split(",")
        .map((value) => value.trim())
        .filter(Boolean);

      preserve.forEach((key) => {
        if (query[key] && !resetKeys.includes(key)) {
          nextQuery[key] = query[key];
        }
      });

      if (select.value) {
        nextQuery[filterKey] = select.value;
      }

      nextQuery.page = 1;
      go(select.getAttribute("data-filter-route"), nextQuery);
    });
  });
}

async function compressImage(file) {
  const bitmap = await createImageBitmap(file);
  const maxDimension = 1600;
  const scale = Math.min(1, maxDimension / Math.max(bitmap.width, bitmap.height));
  const width = Math.max(1, Math.round(bitmap.width * scale));
  const height = Math.max(1, Math.round(bitmap.height * scale));

  const canvas = document.createElement("canvas");
  canvas.width = width;
  canvas.height = height;
  const context = canvas.getContext("2d");
  context.drawImage(bitmap, 0, 0, width, height);

  const blob = await new Promise((resolve, reject) => {
    canvas.toBlob(
      (result) => {
        if (result) {
          resolve(result);
        } else {
          reject(new Error("Unable to compress image."));
        }
      },
      file.type === "image/png" ? "image/png" : "image/jpeg",
      0.78,
    );
  });

  return new File([blob], file.name.replace(/\.\w+$/, "") + (file.type === "image/png" ? ".png" : ".jpg"), {
    type: blob.type,
  });
}

function escapeCsv(value) {
  if (!value) return "";
  return `"${String(value).replace(/"/g, '""')}"`;
}

async function handleExportDevices() {
  try {
    const { query } = getRoute();
    const devices = await getDevicesForExport({
      search: query.q,
      status: query.status,
      visibility: query.visibility || "all",
      deviceType: query.deviceType,
      branchId: query.branchId,
      departmentId: query.departmentId,
      locationId: query.locationId,
    });

    const rows = [
      [
        "asset_code",
        "device_name",
        "device_type",
        "brand",
        "model",
        "serial_number",
        "assigned_to",
        "department",
        "branch",
        "location",
        "status",
        "record_state",
        "qr_slug",
        "created_at",
        "updated_at",
      ].join(","),
      ...devices.map((device) =>
        [
          escapeCsv(device.asset_code),
          escapeCsv(device.device_name),
          escapeCsv(device.device_type),
          escapeCsv(device.brand),
          escapeCsv(device.model),
          escapeCsv(device.serial_number),
          escapeCsv(device.assigned_to),
          escapeCsv(device.departments?.name),
          escapeCsv(device.branches?.name),
          escapeCsv(device.locations?.name),

          escapeCsv(device.qr_slug),
          escapeCsv(device.created_at),
          escapeCsv(device.updated_at),
        ].join(","),
      ),
    ];

    const blob = new Blob([rows.join("\n")], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const anchor = document.createElement("a");
    anchor.href = url;
    anchor.download = "devices-export.csv";
    anchor.click();
    URL.revokeObjectURL(url);
    toast("CSV generated.", "success");
  } catch (error) {
    toast(error.message || "Unable to export devices.", "error");
  }
}

async function appendPublicItems(type, slug, offset) {
  const containerId = type === "history" ? "history-list" : type === "transfers" ? "transfer-list" : "repair-list";
  const container = document.getElementById(containerId);
  if (!container) return;

  try {
    const items =
      type === "history"
        ? await getPublicDeviceHistories(slug, DEVICE_HISTORY_BATCH, offset)
        : type === "transfers"
          ? await getPublicTransferHistories(slug, DEVICE_HISTORY_BATCH, offset)
          : await getPublicRepairHistories(slug, DEVICE_HISTORY_BATCH, offset);

    if (!items.length) {
      toast(`No more ${type} to load.`, "info");
      return;
    }

    const html = items
      .map((item) => {
        if (type === "history") {
          return `
            <div class="timeline-card">
              <div class="split">
                ${renderHistoryBadge(item.action_type)}
                <span class="muted">${escapeHtml(formatDateTime(item.created_at))}</span>
              </div>
              <p style="margin-top: 12px;">${escapeHtml(item.description)}</p>
              ${item.actor_name ? `<p class="timeline-meta">By ${escapeHtml(item.actor_name)}</p>` : ""}
            </div>
          `;
        }

        if (type === "transfers") {
          return `
            <div class="timeline-card">
              <div class="split">
                <strong>${escapeHtml(item.from_assigned_to ?? "Unassigned")} → ${escapeHtml(item.to_assigned_to ?? "Unassigned")}</strong>
                <span class="muted">${escapeHtml(formatDateTime(item.date_transferred))}</span>
              </div>
              <p class="timeline-meta">${escapeHtml(item.reason ?? "No reason")}</p>
            </div>
          `;
        }

        return `
          <div class="timeline-card">
            <div class="split">
              <div class="chip-row">
                ${renderBadge(item.status, getRepairStatusBadgeType(item.status))}
                ${renderBadge(item.priority, "amber")}
              </div>
              <span class="muted">${escapeHtml(formatDateTime(item.requested_at))}</span>
            </div>
            <p style="margin-top: 12px;">${escapeHtml(item.problem_description)}</p>
          </div>
        `;
      })
      .join("");

    container.insertAdjacentHTML("beforeend", html);

    const button = document.querySelector(`[data-action="load-${type}"]`);
    if (button) {
      button.setAttribute("data-offset", String(offset + items.length));
    }
  } catch (error) {
    toast(error.message || `Unable to load more ${type}.`, "error");
  }
}

    return;
  }

  if (action === "archive-device") {
    if (!window.confirm("Archive this device record? It will be hidden from the public QR page until restored.")) {
      return;
    }

    try {
      await archiveDevice(target.getAttribute("data-device-id"), state.user.id);
      toast("Device archived.", "success");
      renderRoute();
    } catch (error) {
      toast(error.message || "Unable to archive device.", "error");
    }
    return;
  }

  if (action === "restore-device") {
    if (!window.confirm("Restore this device record to active inventory?")) {
      return;
    }

    try {
      await restoreDevice(target.getAttribute("data-device-id"), state.user.id);
      toast("Device restored.", "success");
      renderRoute();
    } catch (error) {
      toast(error.message || "Unable to restore device.", "error");
    }
    return;
  }

  if (action === "delete-device") {
    const deviceId = target.getAttribute("data-device-id");
    const deviceLabel = target.getAttribute("data-device-label") || "this device";
    const originalLabel = target.textContent;

    target.disabled = true;
    target.textContent = "Checking...";

    try {
      const usage = await getDeviceDeleteUsage(deviceId);
      const hasDependencies = usage.history > 0 || usage.transfers > 0 || usage.repairs > 0;

      if (hasDependencies) {
        toast(
          `Delete blocked. Archive instead. This device still has linked ${formatDeviceDeleteUsage(usage)}.`,
          "error",
        );
        return;
      }

      target.textContent = "Delete";
      if (!window.confirm(`Delete ${deviceLabel}? This permanently removes the device record because it has no linked transfer, repair, or activity records.`)) {
        return;
      }

      target.textContent = "Deleting...";
      await deleteDevice(deviceId);
      toast("Device deleted.", "success");

      const route = getRoute();
      if (
        (route.path.startsWith("/admin/devices/") && route.path.endsWith("/edit")) ||
        (route.path.startsWith("/device/") && route.path.endsWith("/edit"))
      ) {
        go("/admin/devices");
      } else {
        renderRoute();
      }
    } catch (error) {
      toast(error.message || "Unable to delete device.", "error");
    } finally {
      if (target.isConnected) {
        target.disabled = false;
        target.textContent = originalLabel;
      }
    }
    return;
  }

  if (action === "export-devices") {
    await handleExportDevices();
    return;
  }

  if (action === "archive-master-record") {
    const entity = normalizeMasterEntity(target.getAttribute("data-entity"));
    const label = target.getAttribute("data-record-label") || "this record";

    if (!window.confirm(`Archive ${label}? It will stay recoverable for future use.`)) {
      return;
    }

    try {
      await setMasterRecordActive(entity, target.getAttribute("data-record-id"), false);
      toast(`${getMasterEntityConfig(entity).singular} archived.`, "success");
      renderRoute();
    } catch (error) {
      toast(error.message || "Unable to archive record.", "error");
    }
    return;
  }

  if (action === "restore-master-record") {
    const entity = normalizeMasterEntity(target.getAttribute("data-entity"));
    const label = target.getAttribute("data-record-label") || "this record";

    if (!window.confirm(`Restore ${label} to active master data?`)) {
      return;
    }

    try {
      await setMasterRecordActive(entity, target.getAttribute("data-record-id"), true);
      toast(`${getMasterEntityConfig(entity).singular} restored.`, "success");
      renderRoute();
    } catch (error) {
      toast(error.message || "Unable to restore record.", "error");
    }
    return;
  }

  if (action === "delete-master-record") {
    const entity = normalizeMasterEntity(target.getAttribute("data-entity"));
    const recordId = target.getAttribute("data-record-id");
    const label = target.getAttribute("data-record-label") || "this record";

    try {
      const record = await getMasterRecord(entity, recordId);
      if (!record) {
        toast("Record not found.", "error");
        return;
      }

      const usage = await getMasterRecordUsage(entity, record);
      if (usage.total > 0) {
        const summary = usage.entries
          .filter((entry) => entry.total > 0)
          .map((entry) => `${entry.label}: ${entry.total}`)
          .join(" | ");
        toast(`Delete blocked. Dependencies found for ${label}. ${summary}`, "error");
        return;
      }

      if (!window.confirm(`Delete ${label}? This action cannot be undone.`)) {
        return;
      }

      await deleteMasterRecord(entity, recordId);
      toast(`${getMasterEntityConfig(entity).singular} deleted.`, "success");
      renderRoute();
    } catch (error) {
      toast(error.message || "Unable to delete record.", "error");
    }
    return;
  }

  if (action === "print-qr") {
    window.print();
    return;
  }

  if (action === "load-history") {
    await appendPublicItems("history", target.getAttribute("data-slug"), Number(target.getAttribute("data-offset") || 0));
    return;
  }

  if (action === "load-transfers") {
    await appendPublicItems("transfers", target.getAttribute("data-slug"), Number(target.getAttribute("data-offset") || 0));
    return;
  }

  if (action === "load-repairs") {
    await appendPublicItems("repairs", target.getAttribute("data-slug"), Number(target.getAttribute("data-offset") || 0));
  }
}

function syncLocationOptions(branchSelect, locationSelect) {
  if (!branchSelect || !locationSelect) return;

  const selectedBranch = branchSelect.value;
  const currentValue = locationSelect.value;
  let stillValid = currentValue === "";

  Array.from(locationSelect.options).forEach((option, index) => {
    if (index === 0) {
      option.hidden = false;
      return;
    }

    const branchId = option.getAttribute("data-branch-id");
    const visible = !selectedBranch || branchId === selectedBranch;
    option.hidden = !visible;

    if (!visible && option.selected) {
      option.selected = false;
    }

    if (visible && option.value === currentValue) {
      stillValid = true;
    }
  });

  if (!stillValid) {
    locationSelect.value = "";
  }
}

function getDeviceFormPreviewSlug() {
  const form = document.getElementById("device-form");
  if (!form) return "";

  const explicitSlug = form.querySelector("[name='qr_slug']")?.value?.trim() ?? "";
  const assetCode = form.querySelector("[name='asset_code']")?.value?.trim() ?? "";
  return slugify(explicitSlug || assetCode);
}

function syncQrPreviewMeta(slug) {
  const canvas = document.getElementById("device-qr-canvas");
  const placeholder = document.getElementById("device-qr-placeholder");
  const publicUrl = document.getElementById("device-qr-public-url");
  const previewLink = document.getElementById("device-preview-link");
  const printButton = document.querySelector("[data-action='print-qr']");
  const copyButton = document.getElementById("device-copy-public-url");
  const url = buildDevicePublicUrl(slug);

  if (canvas) {
    canvas.classList.toggle("hidden", !slug);
  }

  if (placeholder) {
    placeholder.textContent = slug
      ? "QR preview ready for printing."
      : "Enter an asset code or QR slug to preview the QR label before saving.";
    placeholder.classList.toggle("hidden", !!slug);
  }

  if (publicUrl) {
    publicUrl.textContent = url || "Enter an asset code or QR slug to generate the public device URL.";
  }

  if (previewLink) {
    previewLink.href = slug ? routeHref(`/device/${encodeURIComponent(slug)}`) : "#";
    previewLink.classList.toggle("is-disabled", !slug);
  }

  if (printButton) {
    printButton.disabled = !slug;
  }

  if (copyButton) {
    copyButton.disabled = !url;
    copyButton.setAttribute("data-public-url", url);
  }
}

function showQrPreviewError(message) {
  const canvas = document.getElementById("device-qr-canvas");
  const placeholder = document.getElementById("device-qr-placeholder");
  const printButton = document.querySelector("[data-action='print-qr']");
  const copyButton = document.getElementById("device-copy-public-url");

  if (canvas) {
    canvas.classList.add("hidden");
  }

  if (placeholder) {
    placeholder.textContent = message;
    placeholder.classList.remove("hidden");
  }

  if (printButton) {
    printButton.disabled = true;
  }

  if (copyButton) {
    copyButton.disabled = true;
    copyButton.setAttribute("data-public-url", "");
  }
}

async function bindRouteForms() {
  document.querySelector("#admin-login-form")?.addEventListener("submit", handleAdminLoginSubmit);
  document.querySelector("#device-form")?.addEventListener("submit", handleDeviceFormSubmit);
  document.querySelector("#master-data-form")?.addEventListener("submit", handleMasterDataFormSubmit);
  document.querySelector("#repair-form")?.addEventListener("submit", handleRepairFormSubmit);
  document.querySelector("#repair-update-form")?.addEventListener("submit", handleRepairUpdateSubmit);
  document.querySelector("#transfer-form")?.addEventListener("submit", handleTransferSubmit);

  const branchSelect = document.querySelector("#branch_id");
  const locationSelect = document.querySelector("#location_id");
  if (branchSelect && locationSelect) {
    syncLocationOptions(branchSelect, locationSelect);
    branchSelect.addEventListener("change", () => syncLocationOptions(branchSelect, locationSelect));
  }

  const transferBranchSelect = document.querySelector("#to_branch_id");
  const transferLocationSelect = document.querySelector("#to_location_id");
  if (transferBranchSelect && transferLocationSelect) {
    syncLocationOptions(transferBranchSelect, transferLocationSelect);
    transferBranchSelect.addEventListener("change", () =>
      syncLocationOptions(transferBranchSelect, transferLocationSelect),
    );
  }

  const filterBranchSelect = document.querySelector("#device-branch-filter");
  const filterLocationSelect = document.querySelector("#device-location-filter");
  if (filterBranchSelect && filterLocationSelect) {
    syncLocationOptions(filterBranchSelect, filterLocationSelect);
    filterBranchSelect.addEventListener("change", () => syncLocationOptions(filterBranchSelect, filterLocationSelect));
  }

  const assetCodeInput = document.querySelector("#asset_code");
  const qrSlugInput = document.querySelector("#qr_slug");
  [assetCodeInput, qrSlugInput]
    .filter(Boolean)
    .forEach((input) => input.addEventListener("input", () => renderQrCanvas()));
}

async function renderQrCanvas() {
  const canvas = document.getElementById("device-qr-canvas");
  if (!canvas) return;

  const context = canvas.getContext("2d");
  context?.clearRect(0, 0, canvas.width, canvas.height);

  const route = getRoute();
  let slug = getDeviceFormPreviewSlug();

  if (!slug && route.path.startsWith("/device/") && route.path.endsWith("/edit")) {
    slug = decodeURIComponent(route.path.split("/")[2]);
  }

  syncQrPreviewMeta(slug);
  if (!slug) return;

  const url = buildDevicePublicUrl(slug);
  canvas.classList.remove("hidden");

  try {
    await QRCode.toCanvas(canvas, url, {
      width: 220,
      margin: 1,
      color: {
        dark: "#0f172a",
        light: "#ffffff",
      },
    });
  } catch (error) {
    console.error("QR preview render failed", error);
    showQrPreviewError("QR preview failed to render. Save the device and reopen this page to retry.");
  }
}

async function renderRoute() {
  const token = ++state.renderToken;
  app.innerHTML = loadingShell("Loading workspace...");

  try {
    const html = await resolveRoute();
    if (!html || token !== state.renderToken) {
      return;
    }

    app.innerHTML = html;
    bindDebouncedSearchInputs();
    bindFilterSelects();
    await bindRouteForms();
    await renderQrCanvas();
    renderToasts();
  } catch (error) {
    if (token !== state.renderToken) {
      return;
    }

    app.innerHTML = shell(`
      <section class="panel">
        <div class="panel-pad">
          <div class="alert error">${escapeHtml(error.message || "Something went wrong while loading this route.")}</div>
          <div class="action-row" style="margin-top: 18px;">
            <a class="button secondary" href="${routeHref("/")}">Back Home</a>
          </div>
        </div>
      </section>
    `);
    renderToasts();
  }
}

async function init() {
  normalizeRedirectedRoute();
  await ensureAuthHydrated();

  subscribeToAuthChanges(async (session) => {
    state.session = session;
    state.user = session?.user ?? null;
    state.profile = state.user ? await getCurrentProfile(state.user.id) : null;
    renderRoute();
  });

  window.addEventListener("hashchange", () => renderRoute());
  document.addEventListener("click", handleAction);

  renderRoute();
}

init();
