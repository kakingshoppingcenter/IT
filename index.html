<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IT Inventory Management System</title>
    <meta
      name="description"
      content="Static GitHub Pages IT inventory system backed by Supabase with QR device pages, repair requests, transfer tracking, and admin workflows."
    />
    <style>
:root {
  color-scheme: dark;
  --bg-0: #07101e;
  --bg-1: #091427;
  --bg-2: #0b1d39;
  --panel: rgba(9, 20, 40, 0.78);
  --panel-strong: rgba(7, 15, 30, 0.92);
  --panel-soft: rgba(255, 255, 255, 0.05);
  --line: rgba(132, 177, 255, 0.18);
  --line-strong: rgba(132, 177, 255, 0.28);
  --text: #f3f7ff;
  --muted: #a8b9d3;
  --muted-strong: #d7e4ff;
  --blue: #1877f2;
  --blue-strong: #0f5ecb;
  --cyan: #4ce2ff;
  --sky: #b8e7ff;
  --emerald: #6ee7b7;
  --rose: #fb7185;
  --amber: #fbbf24;
  --shadow: 0 24px 64px rgba(2, 8, 23, 0.32);
  --shadow-soft: 0 16px 34px rgba(2, 8, 23, 0.18);
  --radius-xl: 30px;
  --radius-lg: 24px;
  --radius-md: 18px;
  --radius-sm: 14px;
  --content-width: 1240px;
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: "Segoe UI", "Inter", system-ui, sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at 12% 10%, rgba(24, 119, 242, 0.24), transparent 22%),
    radial-gradient(circle at 88% 12%, rgba(76, 226, 255, 0.16), transparent 19%),
    radial-gradient(circle at 74% 76%, rgba(24, 119, 242, 0.18), transparent 24%),
    linear-gradient(160deg, var(--bg-0) 0%, var(--bg-1) 48%, #06111f 100%);
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  background-image:
    linear-gradient(rgba(132, 177, 255, 0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(132, 177, 255, 0.06) 1px, transparent 1px);
  background-size: 86px 86px;
  mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.84), transparent 90%);
}

a {
  color: inherit;
  text-decoration: none;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
}

.hidden {
  display: none !important;
}

.app-shell,
.boot-shell {
  width: min(var(--content-width), calc(100% - 32px));
  margin: 0 auto;
  padding: 24px 0 56px;
}

.app-shell {
  display: grid;
  gap: 24px;
}

.boot-shell {
  display: flex;
  min-height: 100vh;
  align-items: center;
  justify-content: center;
}

.boot-panel,
.panel {
  position: relative;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: var(--radius-xl);
  background:
    radial-gradient(circle at top right, rgba(76, 226, 255, 0.12), transparent 28%),
    linear-gradient(180deg, rgba(9, 20, 40, 0.92), rgba(7, 15, 30, 0.84));
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
}

.boot-panel {
  max-width: 640px;
  padding: 28px;
}

.panel::before,
.boot-panel::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 22%);
  pointer-events: none;
}

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin: 0;
  padding: 10px 16px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.05);
  color: var(--sky);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.eyebrow::before {
  content: "";
  width: 10px;
  height: 10px;
  border-radius: 999px;
  background: linear-gradient(135deg, var(--blue), var(--cyan));
  box-shadow: 0 0 0 6px rgba(24, 119, 242, 0.12);
}

.boot-panel h1,
.hero-title,
.section-title,
.panel-title {
  margin: 18px 0 0;
  letter-spacing: -0.04em;
  line-height: 0.98;
}

.boot-panel h1 {
  font-size: clamp(2rem, 4vw, 3.2rem);
}

.boot-copy,
.hero-copy,
.section-copy,
.muted {
  color: var(--muted);
  line-height: 1.8;
}

.topbar {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
}

.brand {

  align-items: center;
  gap: 14px;
}

.brand-mark {
  display: flex;
  width: 52px;
  height: 52px;
  align-items: center;
  justify-content: center;
  border-radius: 18px;
  border: 1px solid var(--line);
  background: linear-gradient(135deg, rgba(24, 119, 242, 0.26), rgba(76, 226, 255, 0.12));
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
  font-weight: 900;
  letter-spacing: 0.06em;
  color: white;
}

.brand-copy h1 {
  margin: 0;
  font-size: 1.1rem;
}

.brand-copy p {
  margin: 4px 0 0;
  font-size: 0.95rem;

}

.top-actions,
.nav-links,
.action-row,
.filter-row,
.card-grid,
.stats-grid,
.chip-row,
.page-actions {

}

.nav-links a,
.chip,
.button,
.ghost-button,
.badge,
.status-badge,
.tiny-link {

}

.nav-links a,
.chip,

.nav-links a,
.chip {

}

.nav-links a.active,
.chip.active {
  border-color: rgba(76, 226, 255, 0.28);

.nav-links a:hover,

.hero {

  gap: 24px;
  grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
}

.hero-main,
.hero-side,
.panel-pad {

}

.hero-title {

}

.hero-copy {
  margin-top: 16px;
  max-width: 720px;
  font-size: 1.04rem;
}

.cta-primary,
.button.primary {
  background: linear-gradient(135deg, var(--blue) 0%, #46b8ff 54%, var(--cyan) 100%);
  border: 0;
  color: white;
  box-shadow: 0 18px 34px rgba(24, 119, 242, 0.26);
}

.cta-secondary,
.button.secondary {

  border: 1px solid var(--line);

}

.button,
.cta-primary,
.cta-secondary,
.ghost-button {

  min-height: 46px;

.ghost-button {

}

.button.danger {

  background: linear-gradient(135deg, #be123c, #fb7185);

}

.button.success {

  background: linear-gradient(135deg, #059669, #34d399);
  color: white;
}

.button[disabled],
.ghost-button[disabled] {

  cursor: not-allowed;

}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.stat-card,
.info-card,
.feed-card,
.metric-card,
.table-shell,
.empty-state,
.form-shell,
.detail-shell,

}

.stat-card,
.info-card,
.metric-card,

.stat-card strong,
.metric-value {

.stat-card span,

.stack-grid,
.page-grid,
.detail-grid,
.device-grid {

}

.page-grid {
  grid-template-columns: minmax(0, 1fr);
}

.device-grid {
  grid-template-columns: minmax(0, 1.18fr) minmax(320px, 0.82fr);

.detail-grid {

.form-grid {
  display: grid;
  gap: 18px;
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.form-grid .full {

}

.field {
  display: grid;
  gap: 8px;
}

.field label {
  color: var(--muted-strong);

  font-weight: 800;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.input,
.select,
.textarea,
.file-input {
  width: 100%;
  min-height: 48px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: linear-gradient(180deg, rgba(9, 20, 40, 0.88), rgba(10, 25, 48, 0.74));
  color: var(--text);
  padding: 12px 14px;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), var(--shadow-soft);
  outline: none;
}

.textarea {
  min-height: 120px;

}

.input:focus,
.select:focus,
.textarea:focus,
.file-input:focus {

  box-shadow: 0 0 0 4px rgba(76, 226, 255, 0.14);

.checkbox-grid {
  display: grid;
  gap: 12px;
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.checkbox-card {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 14px 16px;
  border-radius: 18px;
  border: 1px solid var(--line);
  background: var(--panel-soft);
}

.checkbox-card input {
  margin-top: 3px;
}

.checkbox-card strong {
  display: block;
  font-size: 0.94rem;
}

.checkbox-card span {
  display: block;
  margin-top: 4px;
  color: var(--muted);
  font-size: 0.88rem;
  line-height: 1.6;
}

.table-shell {
  overflow: hidden;
}

.table-scroll {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 840px;
}

thead {
  background: rgba(255, 255, 255, 0.05);
}

th,
td {

  text-align: left;
  vertical-align: top;
}

th {

  font-size: 0.74rem;
  font-weight: 800;
  letter-spacing: 0.18em;

.status-badge,

  justify-content: center;

}

.badge.info {

}

.badge.active {

}

.badge.archived,

.badge.amber {

.timeline,

.detail-list p,

.panel-title {

}

.section-title {

.section-copy,
.helper-text,
.table-note,

.hero-side .timeline-card + .timeline-card,

.timeline-card strong {

}

.timeline-meta {

.panel-head,

.pagination {

}

.pagination .ghost-button.active {

.alert {

.alert.error {

.alert.success {

    <div id="app">
      <main class="boot-shell">
        <section class="boot-panel">
          <p class="eyebrow">Booting Workspace</p>
          <h1>Loading the GitHub + Supabase inventory console...</h1>

    <noscript>

        <section class="boot-panel">
          <p class="eyebrow">JavaScript Required</p>
          <h1>This app needs JavaScript enabled.</h1>

            GitHub Pages can serve this site statically, but the inventory system itself runs in the browser.
          </p>
        </section>
      </main>
    </noscript>

    <script type="module">
import QRCode from "https://esm.sh/qrcode@1.5.4";
import { createClient } from "https://esm.sh/@supabase/supabase-js@2.49.8";

const SUPABASE_URL = "https://uifgmpglhpnyjhlwgihf.supabase.co";
const SUPABASE_ANON_KEY =
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpZmdtcGdsaHBueWpobHdnaWhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NTkwNzYsImV4cCI6MjA5MjIzNTA3Nn0.DrXRdfX6y7yx25xCZq8IlIO13aD-sNhfHgUQF6PLuPI";

const APP_TITLE = "IT Inventory Management System";
const ADMIN_PAGE_SIZE = 10;
const DEVICE_HISTORY_BATCH = 5;
const EXPORT_LIMIT = 1000;
const LOOKUP_CACHE_KEY = "itims.lookup-cache.v1";
const LOOKUP_CACHE_TTL_MS = 60 * 60 * 1000;
const RESERVED_ROOTS = new Set(["admin", "device", "assets"]);

function detectBasePath(pathname = window.location.pathname) {
  const segments = pathname.split("/").filter(Boolean);
  const isGithubPagesHost = /\.github\.io$/i.test(window.location.hostname);

  if (!isGithubPagesHost || segments.length === 0) {
    return "";
  }

  if (RESERVED_ROOTS.has(segments[0])) {
    return "";
  }

  return `/${segments[0]}`;
}

function routeHref(path, query = {}) {
  const params = new URLSearchParams();

  Object.entries(query).forEach(([key, value]) => {
    if (value !== undefined && value !== null && value !== "") {
      params.set(key, String(value));
    }
  });

  const suffix = params.toString() ? `?${params.toString()}` : "";
  return `#${path}${suffix}`;
}

function absoluteHashUrl(path, query = {}) {
  const basePath = detectBasePath();
  const hash = routeHref(path, query);
  return `${window.location.origin}${basePath}/${hash}`;
}


const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true,
  },
});

function escapeLikeValue(value) {
  return value.replace(/[%_]/g, (char) => `\\${char}`);
}

function normalizeVisibility(visibility) {
  if (visibility === "active" || visibility === "archived" || visibility === "all") {
    return visibility;
  }

  return "all";
}

function applyDeviceFilters(query, { search, status, visibility }) {
  const nextVisibility = normalizeVisibility(visibility);
  let nextQuery = query;

  if (nextVisibility === "active") {
    nextQuery = nextQuery.eq("is_active", true);
  } else if (nextVisibility === "archived") {
    nextQuery = nextQuery.eq("is_active", false);
  }

  if (search) {
    const keyword = escapeLikeValue(search.trim());
    nextQuery = nextQuery.or(
      `asset_code.ilike.%${keyword}%,device_name.ilike.%${keyword}%,serial_number.ilike.%${keyword}%`,
    );
  }

  if (status) {
    nextQuery = nextQuery.eq("status", status);
  }

  return nextQuery;
}

async function getSessionBundle() {
  const {
    data: { session },
    error,
  } = await supabase.auth.getSession();

  if (error) {
    throw error;
  }

  return session;
}

async function signInAdmin(email, password) {
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) {
    throw error;
  }

  return data;
}

async function signOutAdmin() {
  const { error } = await supabase.auth.signOut();

  if (error) {
    throw error;
  }
}

async function getCurrentProfile(userId) {
  if (!userId) {
    return null;
  }

  const { data, error } = await supabase
    .from("profiles")
    .select("id, full_name, role")
    .eq("id", userId)
    .maybeSingle();

  if (error) {
    throw error;
  }

  return data;
}

async function getLookupData(forceRefresh = false) {
  if (!forceRefresh) {
    const cached = window.sessionStorage.getItem(LOOKUP_CACHE_KEY);

    if (cached) {
      try {
        const parsed = JSON.parse(cached);

        if (Date.now() - parsed.timestamp < LOOKUP_CACHE_TTL_MS) {
          return parsed.value;
        }
      } catch {
        window.sessionStorage.removeItem(LOOKUP_CACHE_KEY);
      }
    }
  }

  const [departmentsResult, branchesResult, locationsResult] = await Promise.all([
    supabase.from("departments").select("id, name, code").order("name"),
    supabase.from("branches").select("id, name, code").order("name"),
    supabase.from("locations").select("id, name, code, branch_id, floor_label").order("name"),
  ]);

  for (const result of [departmentsResult, branchesResult, locationsResult]) {

    }
  }

    departments: departmentsResult.data ?? [],
    branches: branchesResult.data ?? [],
    locations: locationsResult.data ?? [],

    supabase.from("devices").select("id", { head: true, count: "exact" }).eq("is_active", true),

    supabase.from("transfer_histories").select("id", { head: true, count: "exact" }).gte("date_transferred", monthStart),
  ]);

  for (const result of [devices, pendingRepairs, activeRepairs, transfers]) {
    if (result.error) {

  }

  return {
    totalDevices: devices.count ?? 0,
    pendingRepairs: pendingRepairs.count ?? 0,

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function slugify(value) {
  return String(value ?? "")
    .trim()
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "")
    .slice(0, 80);
}

function formatDate(value) {
  if (!value) return "Not available";
  return new Intl.DateTimeFormat("en-US", { dateStyle: "medium" }).format(new Date(value));
}

function formatDateTime(value) {
  if (!value) return "Not available";
  return new Intl.DateTimeFormat("en-US", { dateStyle: "medium", timeStyle: "short" }).format(
    new Date(value),
  );
}

function toNullable(value) {
  const trimmed = String(value ?? "").trim();
  return trimmed ? trimmed : null;
}

function boolFromForm(formData, key) {

function getRoute() {
  const raw = window.location.hash.replace(/^#/, "") || "/";
  const [pathPart, queryString = ""] = raw.split("?");
  const path = pathPart.startsWith("/") ? pathPart : `/${pathPart}`;
  const query = Object.fromEntries(new URLSearchParams(queryString).entries());
  return { path, query };
}

function go(path, query = {}, replace = false) {
  const href = routeHref(path, query);

  if (replace) {
    window.location.replace(href);
  } else {
    window.location.hash = href.slice(1);
  }
}

function replaceRoute(path, query = {}) {
  const nextHash = routeHref(path, query);
  const basePath = detectBasePath();
  history.replaceState({}, "", `${basePath}/${nextHash}`);
  renderRoute();
}

function toast(message, type = "info") {
  state.toasts = [...state.toasts, { id: crypto.randomUUID(), message, type }].slice(-3);
  renderToasts();

  if (state.toastTimer) {
    window.clearTimeout(state.toastTimer);

  state.toastTimer = window.setTimeout(() => {

    renderToasts();
  }, 3200);
}

  overlay.innerHTML = state.toasts
    .map(

    )
    .join("");
}

function renderPagination(path, query, currentPage, totalPages) {
  if (totalPages <= 1) return "";

  const items = [];
  const start = Math.max(1, currentPage - 2);
  const end = Math.min(totalPages, currentPage + 2);

  items.push(
    `<a class="ghost-button ${currentPage === 1 ? "hidden" : ""}" href="${routeHref(path, {
      ...query,
      page: Math.max(1, currentPage - 1),
    })}">Previous</a>`,
  );

  for (let page = start; page <= end; page += 1) {
    items.push(
      `<a class="ghost-button ${page === currentPage ? "active" : ""}" href="${routeHref(path, {
        ...query,
        page,
      })}">${page}</a>`,
    );
  }

  items.push(
    `<a class="ghost-button ${currentPage === totalPages ? "hidden" : ""}" href="${routeHref(path, {
      ...query,
      page: Math.min(totalPages, currentPage + 1),
    })}">Next</a>`,
  );

  return `<div class="pagination">${items.join("")}</div>`;
}

function parseDeviceRoute(path) {
  const deviceMatch = path.match(/^\/device\/([^/]+)$/);
  if (deviceMatch) {
    return { kind: "public-device", slug: decodeURIComponent(deviceMatch[1]) };
  }

  const editMatch = path.match(/^\/device\/([^/]+)\/edit$/);
  if (editMatch) {
    return { kind: "public-device-edit", slug: decodeURIComponent(editMatch[1]) };
  }

  return null;
}

  if (editMatch) {

                ${renderHistoryBadge(item.action_type)}

              ${item.actor_name ? `<p class="timeline-meta">By ${escapeHtml(item.actor_name)}</p>` : ""}
            </div>
          `,
        )
        .join("")
    : emptyState("No history yet", "No device history has been recorded yet.");

  const transferHtml = transferItems.length
    ? transferItems
        .map(
          (item) => `
            <div class="timeline-card">
              <div class="split">
                <strong>${escapeHtml(item.from_assigned_to ?? "Unassigned")} → ${escapeHtml(item.to_assigned_to ?? "Unassigned")}</strong>
                <span class="muted">${escapeHtml(formatDateTime(item.date_transferred))}</span>
              </div>
              <p class="timeline-meta">${escapeHtml(item.from_department_name ?? "No department")} / ${escapeHtml(item.from_branch_name ?? "No branch")} / ${escapeHtml(item.from_location_name ?? "No location")}</p>
              <p class="timeline-meta">${escapeHtml(item.to_department_name ?? "No department")} / ${escapeHtml(item.to_branch_name ?? "No branch")} / ${escapeHtml(item.to_location_name ?? "No location")}</p>

  const repairHtml = repairItems.length
    ? repairItems
        .map(
          (item) => `
            <div class="timeline-card">
              <div class="split">
                <div class="chip-row">
                  ${renderBadge(item.status, "rose")}
                  ${renderBadge(item.priority, "amber")}

        .join("")

  return `

        <div class="panel-pad">

            <div>
              <p class="eyebrow">Recent Device History</p>

            <div>
              <p class="eyebrow">Recent Transfers</p>
              <h3 class="panel-title">Assignment movement</h3>
            </div>

          <div class="timeline" id="transfer-list" style="margin-top: 20px;">${transferHtml}</div>
        </div>

    <section class="panel">

async function resolveRoute() {
  const route = getRoute();
  const deviceRoute = parseDeviceRoute(route.path);
  const adminDeviceRoute = parseAdminDeviceRoute(route.path);
  const adminRepairRoute = parseAdminRepairRoute(route.path);

  if (route.path === "/") {
    return renderHomePage();
  }

  if (route.path === "/admin/login") {
    return renderAdminLoginPage(route.query);
  }

  if (route.path === "/admin/dashboard") {
    if (!isAdmin()) {
      requireAdminRoute(route.path, route.query);
      return null;
    }
    return renderAdminDashboardPage();
  }

  if (route.path === "/admin/devices") {
    if (!isAdmin()) {
      requireAdminRoute(route.path, route.query);
      return null;
    }
    return renderAdminDevicesPage(route.query);
  }

  if (adminDeviceRoute) {
    if (!isAdmin()) {
      requireAdminRoute(route.path, route.query);
      return null;
    }
    return renderAdminDeviceFormPage(adminDeviceRoute.id);
  }

  if (route.path === "/admin/repairs") {
    if (!isAdmin()) {
      requireAdminRoute(route.path, route.query);
      return null;
    }
    return renderAdminRepairsPage(route.query);
  }

  if (adminRepairRoute) {
    if (!isAdmin()) {
      requireAdminRoute(route.path, route.query);
      return null;
    }
    return renderAdminRepairDetailPage(adminRepairRoute.id);
  }

  if (route.path === "/admin/transfers") {
    if (!isAdmin()) {
      requireAdminRoute(route.path, route.query);
      return null;
    }
    return renderAdminTransfersPage(route.query);
  }

  if (route.path === "/admin/history") {
    if (!isAdmin()) {
      requireAdminRoute(route.path, route.query);
      return null;
    }
    return renderAdminHistoryPage(route.query);
  }

  if (deviceRoute?.kind === "public-device") {
    return renderPublicDevicePage(deviceRoute.slug);
  }

  if (deviceRoute?.kind === "public-device-edit") {
    if (!isAdmin()) {
      requireAdminRoute(route.path, route.query);
      return null;
    }
    return renderPublicEditPage(deviceRoute.slug);
  }

  return shell(`
    <section class="panel">
      <div class="panel-pad">
        ${emptyState("Page not found", "The route you requested is not available in this static build.", `<a class="button secondary" href="${routeHref("/")}">Back Home</a>`)}
      </div>
    </section>
  `);
}

function bindDebouncedSearchInputs() {
  const inputs = document.querySelectorAll("[data-search-route]");

  inputs.forEach((input) => {
    let timer = null;

    input.addEventListener("input", () => {
      window.clearTimeout(timer);
      timer = window.setTimeout(() => {
        const { query } = getRoute();
        const nextQuery = {};
        const preserve = String(input.getAttribute("data-preserve") || "")
          .split(",")
          .map((value) => value.trim())
          .filter(Boolean);

        preserve.forEach((key) => {
          if (query[key]) {
            nextQuery[key] = query[key];
          }
        });

        if (input.value.trim()) {
          nextQuery.q = input.value.trim();
        }

        nextQuery.page = 1;
        go(input.getAttribute("data-search-route"), nextQuery);
      }, 350);
    });
  });
}

function bindFilterSelects() {
  const selects = document.querySelectorAll("[data-filter-route]");

  selects.forEach((select) => {
    select.addEventListener("change", () => {
      const { query } = getRoute();
      const nextQuery = {};
      const preserve = String(select.getAttribute("data-preserve") || "")
        .split(",")
        .map((value) => value.trim())
        .filter(Boolean);

      preserve.forEach((key) => {
        if (query[key]) {
          nextQuery[key] = query[key];
        }
      });

      if (select.value) {
        nextQuery.status = select.value;
      }

      nextQuery.page = 1;
      go(select.getAttribute("data-filter-route"), nextQuery);
    });
  });
}

async function compressImage(file) {
  const bitmap = await createImageBitmap(file);
  const maxDimension = 1600;
  const scale = Math.min(1, maxDimension / Math.max(bitmap.width, bitmap.height));
  const width = Math.max(1, Math.round(bitmap.width * scale));
  const height = Math.max(1, Math.round(bitmap.height * scale));

  const canvas = document.createElement("canvas");
  canvas.width = width;
  canvas.height = height;
  const context = canvas.getContext("2d");
  context.drawImage(bitmap, 0, 0, width, height);

  const blob = await new Promise((resolve, reject) => {
    canvas.toBlob(
      (result) => {
        if (result) {
          resolve(result);
        } else {
          reject(new Error("Unable to compress image."));
        }
      },
      file.type === "image/png" ? "image/png" : "image/jpeg",
      0.78,
    );
  });

  return new File([blob], file.name.replace(/\.\w+$/, "") + (file.type === "image/png" ? ".png" : ".jpg"), {
    type: blob.type,
  });
}

async function handleAdminLoginSubmit(event) {
  event.preventDefault();
  const formData = new FormData(event.currentTarget);
  const submitter = event.currentTarget.querySelector("button[type='submit']");
  submitter.disabled = true;
  submitter.textContent = "Signing In...";

  try {
    await signInAdmin(String(formData.get("email")), String(formData.get("password")));
    await ensureAuthHydrated();

    if (!isAdmin()) {
      toast("Signed in, but this user is not an admin profile yet.", "error");
      submitter.disabled = false;
      submitter.textContent = "Sign In";
      return;
    }

    const nextPath = String(formData.get("next") || state.pendingRoute || "/admin/dashboard");
    state.pendingRoute = null;
    go(nextPath.split("?")[0], Object.fromEntries(new URLSearchParams(nextPath.split("?")[1] || "")));
    toast("Admin session ready.", "success");
  } catch (error) {
    toast(error.message || "Unable to sign in.", "error");
    submitter.disabled = false;
    submitter.textContent = "Sign In";
  }
}

function escapeCsv(value) {
  if (!value) return "";
  return `"${String(value).replace(/"/g, '""')}"`;
}

async function handleExportDevices() {
  try {
    const { query } = getRoute();
    const devices = await getDevicesForExport({
      search: query.q,
      status: query.status,
      visibility: query.visibility || "all",
    });

    const rows = [
      [
        "asset_code",
        "device_name",
        "device_type",
        "brand",
        "model",
        "serial_number",
        "assigned_to",
        "department",
        "branch",
        "location",
        "status",
        "record_state",
        "qr_slug",
        "created_at",
        "updated_at",
      ].join(","),
      ...devices.map((device) =>
        [
          escapeCsv(device.asset_code),
          escapeCsv(device.device_name),
          escapeCsv(device.device_type),
          escapeCsv(device.brand),
          escapeCsv(device.model),
          escapeCsv(device.serial_number),
          escapeCsv(device.assigned_to),
          escapeCsv(device.departments?.name),
          escapeCsv(device.branches?.name),
          escapeCsv(device.locations?.name),
          escapeCsv(device.status),
          escapeCsv(device.is_active ? "Active" : "Archived"),
          escapeCsv(device.qr_slug),
          escapeCsv(device.created_at),
          escapeCsv(device.updated_at),
        ].join(","),
      ),
    ];

    const blob = new Blob([rows.join("\n")], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const anchor = document.createElement("a");
    anchor.href = url;
    anchor.download = "devices-export.csv";
    anchor.click();
    URL.revokeObjectURL(url);
    toast("CSV generated.", "success");
  } catch (error) {
    toast(error.message || "Unable to devices.", "error");
  }
}

async function appendPublicItems(type, slug, offset) {
  const containerId = type === "history" ? "history-list" : type === "transfers" ? "transfer-list" : "repair-list";
  const container = document.getElementById(containerId);
  if (!container) return;

  try {
    const items =
      type === "history"
        ? await getPublicDeviceHistories(slug, DEVICE_HISTORY_BATCH, offset)
        : type === "transfers"
          ? await getPublicTransferHistories(slug, DEVICE_HISTORY_BATCH, offset)
          : await getPublicRepairHistories(slug, DEVICE_HISTORY_BATCH, offset);

    if (!items.length) {
      toast(`No more ${type} to load.`, "info");
      return;
    }

    const html = items
      .map((item) => {
        if (type === "history") {
          return `
            <div class="timeline-card">
              <div class="split">
                ${renderHistoryBadge(item.action_type)}
                <span class="muted">${escapeHtml(formatDateTime(item.created_at))}</span>
              </div>
              <p style="margin-top: 12px;">${escapeHtml(item.description)}</p>
              ${item.actor_name ? `<p class="timeline-meta">By ${escapeHtml(item.actor_name)}</p>` : ""}
            </div>
          `;
        }

        if (type === "transfers") {
          return `
            <div class="timeline-card">
              <div class="split">
                <strong>${escapeHtml(item.from_assigned_to ?? "Unassigned")} → ${escapeHtml(item.to_assigned_to ?? "Unassigned")}</strong>
                <span class="muted">${escapeHtml(formatDateTime(item.date_transferred))}</span>
              </div>
              <p class="timeline-meta">${escapeHtml(item.reason ?? "No reason")}</p>
            </div>
          `;
        }

        return `
          <div class="timeline-card">
            <div class="split">
              <div class="chip-row">
                ${renderBadge(item.status, "rose")}
                ${renderBadge(item.priority, "amber")}
              </div>
              <span class="muted">${escapeHtml(formatDateTime(item.requested_at))}</span>
            </div>
            <p style="margin-top: 12px;">${escapeHtml(item.problem_description)}</p>
          </div>
        `;
      })
      .join("");

    container.insertAdjacentHTML("beforeend", html);

    const button = document.querySelector(`[data-action="load-${type}"]`);
    if (button) {
      button.setAttribute("data-offset", String(offset + items.length));
    }
  } catch (error) {
    toast(error.message || `Unable to load more ${type}.`, "error");
  }
}

async function handleAction(event) {
  const target = event.target.closest("[data-action]");
  if (!target) return;

  const action = target.getAttribute("data-action");

  if (action === "sign-out") {
    try {
      await signOutAdmin();
      state.pendingRoute = null;
      toast("Signed out.", "success");
      go("/");
    } catch (error) {
      toast(error.message || "Unable to sign out.", "error");
    }
    return;
  }

  if (action === "archive-device") {
    try {
      await archiveDevice(target.getAttribute("data-device-id"), state.user.id);
      toast("Device archived.", "success");
      renderRoute();
    } catch (error) {
      toast(error.message || "Unable to archive device.", "error");
    }
    return;
  }

  if (action === "restore-device") {
    try {
      await restoreDevice(target.getAttribute("data-device-id"), state.user.id);
      toast("Device restored.", "success");
      renderRoute();
    } catch (error) {
      toast(error.message || "Unable to restore device.", "error");
    }
    return;
  }

  if (action === "export-devices") {
    await handleExportDevices();
    return;
  }

  if (action === "print-qr") {
    window.print();
    return;
  }

  if (action === "load-history") {
    await appendPublicItems("history", target.getAttribute("data-slug"), Number(target.getAttribute("data-offset") || 0));
    return;
  }

  if (action === "load-transfers") {
    await appendPublicItems("transfers", target.getAttribute("data-slug"), Number(target.getAttribute("data-offset") || 0));
    return;
  }

  if (action === "load-repairs") {
    await appendPublicItems("repairs", target.getAttribute("data-slug"), Number(target.getAttribute("data-offset") || 0));
  }
}

function syncLocationOptions(branchSelect, locationSelect) {
  if (!branchSelect || !locationSelect) return;

  const selectedBranch = branchSelect.value;
  const currentValue = locationSelect.value;
  let stillValid = currentValue === "";

  Array.from(locationSelect.options).forEach((option, index) => {
    if (index === 0) {
      option.hidden = false;
      return;
    }

    const branchId = option.getAttribute("data-branch-id");
    const visible = !selectedBranch || branchId === selectedBranch;
    option.hidden = !visible;

    if (!visible && option.selected) {
      option.selected = false;
    }

    if (visible && option.value === currentValue) {
      stillValid = true;
    }
  });

  if (!stillValid) {
    locationSelect.value = "";
  }
}

async function bindRouteForms() {
  document.querySelector("#admin-login-form")?.addEventListener("submit", handleAdminLoginSubmit);
  document.querySelector("#device-form")?.addEventListener("submit", handleDeviceFormSubmit);
  document.querySelector("#repair-form")?.addEventListener("submit", handleRepairFormSubmit);
  document.querySelector("#repair-update-form")?.addEventListener("submit", handleRepairUpdateSubmit);
  document.querySelector("#transfer-form")?.addEventListener("submit", handleTransferSubmit);

  const branchSelect = document.querySelector("#branch_id");
  const locationSelect = document.querySelector("#location_id");
  if (branchSelect && locationSelect) {
    syncLocationOptions(branchSelect, locationSelect);
    branchSelect.addEventListener("change", () => syncLocationOptions(branchSelect, locationSelect));
  }

  const transferBranchSelect = document.querySelector("#to_branch_id");
  const transferLocationSelect = document.querySelector("#to_location_id");
  if (transferBranchSelect && transferLocationSelect) {
    syncLocationOptions(transferBranchSelect, transferLocationSelect);
    transferBranchSelect.addEventListener("change", () =>
      syncLocationOptions(transferBranchSelect, transferLocationSelect),
    );
  }
}

async function renderQrCanvas() {
  const canvas = document.getElementById("device-qr-canvas");
  if (!canvas) return;

  const route = getRoute();
  let slug = "";

  if (route.path.startsWith("/device/") && route.path.endsWith("/edit")) {
    slug = decodeURIComponent(route.path.split("/")[2]);
  } else if (route.path.startsWith("/admin/devices/")) {
    const form = document.getElementById("device-form");
    slug = slugify(form?.querySelector("[name='qr_slug']")?.value || form?.querySelector("[name='asset_code']")?.value || "");
  }

  if (!slug) return;

  const url = absoluteHashUrl(`/device/${slug}`);
  await QRCode.toCanvas(canvas, url, {
    width: 220,
    margin: 1,
    color: {
      dark: "#0b1628",
      light: "#ffffff",
    },
  });
}

async function renderRoute() {
  const token = ++state.renderToken;
  app.innerHTML = loadingShell("Loading workspace...");

  try {
    const html = await resolveRoute();
    if (!html || token !== state.renderToken) {
      return;
    }

    app.innerHTML = html;
    bindDebouncedSearchInputs();
    bindFilterSelects();
    await bindRouteForms();
    await renderQrCanvas();
    renderToasts();
  } catch (error) {
    if (token !== state.renderToken) {
      return;
    }

    app.innerHTML = shell(`
      <section class="panel">
        <div class="panel-pad">
          <div class="alert error">${escapeHtml(error.message || "Something went wrong while loading this route.")}</div>
          <div class="action-row" style="margin-top: 18px;">
            <a class="button secondary" href="${routeHref("/")}">Back Home</a>
          </div>
        </div>
      </section>
    `);
    renderToasts();
  }
}

async function init() {
  normalizeRedirectedRoute();
  await ensureAuthHydrated();

  subscribeToAuthChanges(async (session) => {
    state.session = session;
    state.user = session?.user ?? null;
    state.profile = state.user ? await getCurrentProfile(state.user.id) : null;
    renderRoute();
  });

  window.addEventListener("hashchange", () => renderRoute());
  document.addEventListener("click", handleAction);

  renderRoute();
}

init();
